<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="content-type" content="text/html; charset=utf-8" />
	<title>ValidFIX - FIX Analyzer</title>
	<meta name="description" content="FIX Analyzer gives users the ability to inspect, analyze and validate one single FIX message" />
	<link href="https://www.validfix.com/s.css" rel="stylesheet" type="text/css" />
</head>
<body>
	<div id='init'></div>
	<div id="header">
	    <a href="https://www.validfix.com/index.html">
    	<img src="https://www.validfix.com/img/validfix.jpg" border="0" alt="ValidFIX - For FIX Protocol Users"/>
    	</a>
	</div>
	<div id="menu">
		<ul>
		   <li>FIX Analyzer</li>
			<li><a href="fix-log-analyzer.html">FIX Log Analyzer</a></li>
			<li><a href="fix-cube.html">FIX Cube</a></li>
		</ul>
	</div>
	<div id='smae' onclick='tryMe();'>[Show Me An Example]</div>
	<div style="margin-left:2%;margin-right:2%;text-align:center;padding:30px 0 0 0;">
  		<div id='wrnsoh' style="display:none;">
			<h5>
			Warning: Your Browser does not support the &lt;soh&gt; delimiter in input fields.<br>
			Switch to <a href="fix-log-analyzer.html">FIX Log Analyzer</a> or make sure 
			you use a different separator, such as the pipe character |.
			</h5>
		</div>
		<input id='txtFix' type="text"  style="font-size:11px;width:100%" onkeydown="if (event.keyCode == 13) { if (document.exec) document.exec(); else document.getElementById('init').innerHTML='Loading...' }">
		<button type="button" style="margin:2px 0 0 0;" onclick="if (document.exec) document.exec(); else document.getElementById('init').innerHTML='Loading...'">Analyze</button>
	</div>
	<div id='result' style="position: relative;
        white-space:nowrap;
        margin-left:2%;
        left:0px;
        top: 30px;
        font-size:  10px;
    	  font-family:Verdana;
        color:      black;
        background-color: #FFFFFF;">
	</div>
	<script>
		var script = document.createElement("script");
		script.type = "text/javascript";
		script.src = "aents/a0a130205-lmax-chetparm-feb-aa-aplx32644/js/all.js";
		document.body.appendChild(script);
	</script> 
</body>
</html>
